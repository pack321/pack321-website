<!-- Pack 321 shared hero component
Use the same structure on every major page. Only update:
- h1 lines
- description paragraph
- hero photo src: update per page, for example assets/images/hero/why-pack321.jpg
Missing photos fall back to assets/images/placeholders/hero-placeholder.jpg.
-->
<section class="pack-hero" aria-label="Page Title hero">
  <div class="pack-hero__copy">
    <div class="pack-hero__lockup" aria-label="Pack 321 Oak Creek Wisconsin">
      <span class="pack-hero__line"></span>
      <img src="assets/logos/cub-scout-logo.svg" alt="Pack 321 logo">
      <span class="pack-hero__line"></span>
      <div class="pack-hero__brand">
        <strong>Pack 321</strong>
        <span>Oak Creek, Wisconsin</span>
        <em>Serving families since 1967</em>
      </div>
    </div>
    <h1><span>Page</span><span class="gold">Title</span></h1>
    <div class="pack-hero__rule"><span></span><b>✦</b><span></span></div>
    <p>Page description goes here.</p>
    <div class="pack-hero__coins" aria-label="Pack 321 welcome highlights">
      <article class="pack-hero__coin"><img src="assets/icons/boys-girls.png" alt="Boys & Girls Welcome" data-fallback="assets/images/placeholders/card-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/card-placeholder.jpg';"><strong>Boys & Girls<br>Welcome</strong></article>
      <article class="pack-hero__coin"><img src="assets/icons/any-school.png" alt="Any School, Any Community" data-fallback="assets/images/placeholders/card-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/card-placeholder.jpg';"><strong>Any School,<br>Any Community</strong></article>
      <article class="pack-hero__coin"><img src="assets/icons/parents-participate.png" alt="Parents Participate" data-fallback="assets/images/placeholders/card-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/card-placeholder.jpg';"><strong>Parents<br>Participate</strong></article>
      <article class="pack-hero__coin"><img src="assets/icons/siblings-welcome.png" alt="Siblings Welcome" data-fallback="assets/images/placeholders/card-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/card-placeholder.jpg';"><strong>Siblings<br>Welcome</strong></article>
      <article class="pack-hero__coin"><img src="assets/icons/grandparents-welcome.png" alt="Grandparents Welcome" data-fallback="assets/images/placeholders/card-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/card-placeholder.jpg';"><strong>Grandparents<br>Welcome</strong></article>
    </div>
  </div>
  <div class="pack-hero__media">
    <img src="assets/images/placeholders/hero-placeholder.jpg" alt="Page Title photo" data-fallback="assets/images/placeholders/hero-placeholder.jpg" onerror="this.onerror=null;this.src='assets/images/placeholders/hero-placeholder.jpg';">
  </div>
</section>
